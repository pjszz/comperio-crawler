name: Bunjang 3-Day Price Crawler

on:
  schedule:
    # 3일 간격으로 한국 시간(KST) 오전 9시(UTC 00:00)에 실행
    - cron: '0 0 */3 * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client

    - name: Create credentials.json from Secret
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

    - name: Run Bunjang Crawler
      run: |
        python bunjang_crawler.py