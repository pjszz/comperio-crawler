name: Comperio Daily Price Crawler

on:
  schedule:
    # 매일 한국 시간(KST) 오전 9시 정각에 자동으로 실행 (UTC 기준 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 깃허브 웹페이지에서 수동으로 실행할 수 있도록 허용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client

    - name: Create credentials.json from Secret
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

    - name: Run Crawler
      run: |
        python danawa_crawler.py